name: UChat → Chatwoot Migration

on:
  workflow_dispatch:        # تشغيل يدوي من الـ UI
  schedule:
    - cron: '0 */6 * * *'   # كل 6 ساعات

permissions:
  contents: write           # نحتاجها عشان نعمل commit للـ progress

# امنع تشغيل أكتر من instance في نفس الوقت
concurrency:
  group: uchat-migration
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 350    # 5h 50min — تحت الـ 6h hard limit

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run migration
        env:
          UCHAT_API_TOKEN:   ${{ secrets.UCHAT_API_TOKEN }}
          CHATWOOT_API_TOKEN: ${{ secrets.CHATWOOT_API_TOKEN }}
          CHATWOOT_BASE_URL: ${{ secrets.CHATWOOT_BASE_URL }}
          ACCOUNT_ID:        ${{ secrets.ACCOUNT_ID }}
          INBOX_ID:          ${{ secrets.INBOX_ID }}
          MAX_RUNTIME_SECONDS: '19800'   # 5.5h soft timeout
        run: python -u main.py

      - name: Commit progress
        if: always()        # نعمل commit حتى لو الـ job فشل
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_numbers.txt || true
          if git diff --staged --quiet; then
            echo "لا تغييرات للـ commit."
          else
            git commit -m "chore: update migration progress [skip ci]"
            git push
          fi
